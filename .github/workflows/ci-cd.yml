name: NovaBank CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build backend image
        run: |
          docker build -t novabank-backend ./backend

      - name: Build frontend image
        run: |
          docker build -t novabank-frontend ./frontend

      - name: Run tests (optional placeholder)
        run: echo "No tests yet - future step"

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy message
        run: echo "Deploy step will connect to cloud server later"