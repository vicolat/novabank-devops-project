services:

  db:
    image: postgres:16

    container_name: novabank-db

    restart: unless-stopped

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: novabank

    ports:
      - "5432:5432"

    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend

    container_name: novabank-backend

    restart: unless-stopped

    environment:
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: novabank
      JWT_SECRET: novabank_super_secret_12345
      PORT: 5000

    ports:
      - "5000:5000"

    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend

    container_name: novabank-frontend

    restart: unless-stopped

    ports:
      - "3000:80"

    depends_on:
      - backend

volumes:
  pgdata: